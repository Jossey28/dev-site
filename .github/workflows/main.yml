name: Build & Push to Container Hub

on:
  push:
    branches:
      - publish

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            suffix: arm
          - runner: ubuntu-latest
            platform: linux/amd64
            suffix: amd
            
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Get metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/jossey28/dev-site
      
      - uses: docker/setup-buildx-action@v3
      
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: ${{ matrix.platform }}
          tags: |
            ghcr.io/jossey28/dev-site:latest-${{ matrix.suffix }}
            ghcr.io/jossey28/dev-site:${{ github.sha }}-${{ matrix.suffix }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_COMMIT_SHA_ARG=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.suffix }}

  merge-manifest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: docker/setup-buildx-action@v3
      
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create -t ghcr.io/jossey28/dev-site:latest \
            ghcr.io/jossey28/dev-site:latest-amd \
            ghcr.io/jossey28/dev-site:latest-arm

          docker buildx imagetools create -t ghcr.io/jossey28/dev-site:${{ github.sha }} \
            ghcr.io/jossey28/dev-site:${{ github.sha }}-amd \
            ghcr.io/jossey28/dev-site:${{ github.sha }}-arm